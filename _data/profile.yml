short_bio: >-
  <p>
    I received my Ph.D. from Dalian University of Technology, advised by
    <a href="https://peihuali.org" target="_blank">Prof. Peihua Li</a>.
    My research focuses on computer vision, with particular interests in multimodal large language models,
    video understanding, image recognition, few-shot learning, and representation learning.
  </p>
  <p>
    My work has been published in leading conferences and journals, including CVPR, NeurIPS,
    IJCV, ACM MM, and IEEE TNNLS.
  </p>
  <p>
    I have served as a reviewer for CVPR, ICCV, IJCV, TIP, TNNLS, AAAI, and ACM MM.
  </p>
  <p>
    I am currently seeking research and engineering opportunities in computer vision,
    multimodal learning, and foundation models.
  </p>

